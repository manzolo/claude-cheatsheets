name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Dipendenze di sistema di WeasyPrint + il font DejaVu usato dai volumi
      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz-subset0 fonts-dejavu
      - run: pip install weasyprint
      - name: Build PDFs, zip and index
        run: python3 build.py --zip --index
      - name: Sanity check
        run: |
          test "$(ls output/it/*.pdf | wc -l)" -eq 8
          test "$(ls output/en/*.pdf | wc -l)" -eq 8
          test -s output/claude-cheatsheets-it.zip
          test -s output/claude-cheatsheets-en.zip
          test -s output/index.html
      - uses: actions/upload-artifact@v4
        with:
          name: pdfs
          path: output/

  pages:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pdfs
          path: site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment

  release:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: pdfs
          path: output
      - name: Create release with PDFs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" output/*.zip \
            --repo "$GITHUB_REPOSITORY" \
            --title "Claude Cheatsheets $GITHUB_REF_NAME" \
            --generate-notes
